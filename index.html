<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIS VINA 자재 현황 (1240N/1240S)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0f1115;--panel:#171a21;--panel2:#1d212a;--line:#2a2f3a;--txt:#e6e8ec;--txt2:#9aa0ac;--txt3:#6b7280;--ok:#1d9e75;--warn:#ef9f27;--danger:#e24b4a;--info:#378add;--accent:#7f77dd;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
.wrap{max-width:1400px;margin:0 auto;padding:20px}
header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
h1{font-size:20px;font-weight:600}
.sub{color:var(--txt2);font-size:13px}
.tabs{display:flex;gap:8px;margin:14px 0}
.tab{padding:8px 16px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--txt2);cursor:pointer;font-size:13px}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.uploadbar{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px dashed var(--line);border-radius:10px;padding:12px 16px;margin:14px 0}
.uploadbar label.btn{background:var(--accent);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.uploadbar .status{color:var(--txt2);font-size:13px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:18px 0}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.kpi .v{font-size:24px;font-weight:600;letter-spacing:-0.5px}
.kpi .l{color:var(--txt2);font-size:12px;margin-top:2px}
.kpi.dng .v{color:var(--danger)}.kpi.wrn .v{color:var(--warn)}.kpi.ok2 .v{color:var(--ok)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.card h2{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--txt)}
.card h2 span{color:var(--txt2);font-weight:400;font-size:12px;margin-left:6px}
.hint{color:var(--txt3);font-size:11px;margin-bottom:10px}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0}
select,input[type=text]{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 12px;border-radius:8px;font-size:13px;font-family:inherit}
input[type=text]{min-width:200px}
.tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.theadrow{display:flex;padding:10px 14px;background:var(--panel2);border-bottom:1px solid var(--line);font-size:12px;color:var(--txt2);font-weight:600}
.scroll{max-height:520px;overflow-y:auto}
.row{display:flex;padding:9px 14px;border-bottom:1px solid var(--line);align-items:center;cursor:pointer;transition:background .12s}
.row:hover{background:var(--panel2)}
.row.sel{background:#232838;box-shadow:inset 3px 0 0 var(--accent)}
.c-tw{flex:0 0 22px;color:var(--txt3);font-size:11px}
.c-name{flex:3;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.c-name .nm{font-size:13px}.c-name .sub2{font-size:11px;color:var(--txt3)}
.c-num{flex:1;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;padding-right:8px}
.c-bar{flex:1.6;padding-left:8px}
.bartrack{height:18px;background:var(--panel2);border-radius:4px;overflow:hidden;position:relative}
.barfill{height:100%;border-radius:4px}
.bartrack .pct{position:absolute;right:5px;top:0;line-height:18px;font-size:11px;color:var(--txt);font-variant-numeric:tabular-nums}
.neg{color:var(--danger);font-weight:600}
.childbox{background:#13161d;border-bottom:1px solid var(--line);padding:6px 14px 12px 36px}
.childhdr{display:flex;padding:6px 0;font-size:11px;color:var(--txt3);font-weight:600;border-bottom:1px solid var(--line)}
.crow{display:flex;padding:6px 0;font-size:12px;border-bottom:1px solid #1f242e;cursor:pointer}
.crow:hover{background:#1a1e26}
.crow.csel{background:#232838}
.cc-cav{flex:2}.cc-num{flex:1;text-align:right;font-variant-numeric:tabular-nums;padding-right:8px}
.detail{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:16px;min-height:80px}
.detail .empty{color:var(--txt3);text-align:center;padding:30px 0}
.legend{display:flex;gap:16px;font-size:12px;color:var(--txt2);margin-top:10px;flex-wrap:wrap}
.dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px}
.foot{color:var(--txt3);font-size:11px;margin-top:18px;text-align:center}
.page{display:none}.page.active{display:block}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>OIS VINA 자재 현황</h1><span class="sub" id="periodlbl"></span>
<span id="lastUpdate" style="margin-left:auto;font-size:13px;color:var(--ok);background:#13261d;border:1px solid #1d4030;border-radius:8px;padding:6px 12px;white-space:nowrap"></span></header>

<div class="uploadbar">
  <input type="password" id="pwInput" placeholder="업로드 암호" style="max-width:130px;background:#14161b;border-color:#23262d;color:var(--txt3)">
  <label class="btn" for="fileInput">파일 업로드 (.xlsb)</label>
  <input type="file" id="fileInput" accept=".xlsb" style="display:none">
  <span class="status" id="uploadStatus">데이터 불러오는 중...</span>
  <span id="syncBadge" style="margin-left:auto;font-size:12px;color:var(--txt3)"></span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="overview">재고 현황</div>
  <div class="tab" data-tab="fpcb">FPCB 공급 (목표 160K)</div>
</div>

<div class="page active" id="page-overview">
<div id="focusBar" style="display:none;align-items:center;gap:10px;background:#232838;border:1px solid var(--accent);border-radius:10px;padding:10px 16px;margin:14px 0">
  <span style="font-size:13px;color:var(--txt)"><b id="focusName"></b> 단일 보기</span>
  <button id="focusClear" style="margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px">← 전체로 돌아가기</button>
</div>
<div class="kpis" id="kpis"></div>
<div class="grid">
  <div class="card">
    <h2>모델별 재고 비중 <span>1240N / 1240S</span></h2>
    <div style="position:relative;height:240px"><canvas id="modelChart" role="img" aria-label="모델별 재고 비중"></canvas></div>
  </div>
  <div class="card">
    <h2>요일별 입출고 균형 <span id="balScopeLbl">전체 합계</span></h2>
    <div class="hint">모델을 선택하면 그 모델만 집계됩니다.</div>
    <div style="position:relative;height:210px"><canvas id="balChart" role="img" aria-label="요일별 입출고"></canvas></div>
  </div>
</div>

<div class="controls">
  <select id="modelSel"><option value="">전체 (1240N+1240S)</option></select>
  <select id="sortSel">
    <option value="risk">정렬: 소진율 높은순 (위험)</option>
    <option value="ton">정렬: 잔량 적은순</option>
    <option value="out">정렬: 출고 많은순</option>
    <option value="name">정렬: 이름순</option>
  </select>
  <input type="text" id="search" placeholder="자재명 / 코드 검색...">
  <label style="font-size:13px;color:var(--txt2);display:flex;align-items:center;gap:6px;cursor:pointer">
    <input type="checkbox" id="riskOnly"> 위험만 (소진율 90%+)
  </label>
</div>

<div class="tablewrap">
  <div class="theadrow">
    <div class="c-tw"></div>
    <div class="c-name">자재명 (cavity 합산)</div>
    <div class="c-num">기초</div><div class="c-num">입고</div>
    <div class="c-num">출고</div><div class="c-num">잔량</div>
    <div class="c-bar">소진율 (출고/투입)</div>
  </div>
  <div class="scroll" id="tbody"></div>
</div>

<div class="detail" id="detail">
  <div class="empty">자재 행을 클릭하면 cavity별 내역과 일별 입출고·잔량 추이가 펼쳐집니다.</div>
</div>
<div class="foot" id="foot"></div>
</div>

<div class="page" id="page-fpcb">
  <div class="kpis" id="fpcbKpis"></div>
  <div class="card">
    <h2>JYO1240S FPCB(SMT) 일별 공급 <span>목표 160,000개/일</span></h2>
    <div class="legend" style="margin-bottom:10px">
      <span><span class="dot" style="background:#1d9e75"></span>입고 목표달성</span>
      <span><span class="dot" style="background:#e24b4a"></span>입고 목표미달</span>
      <span><span style="display:inline-block;width:14px;border-top:1.5px dashed #9aa0ac;vertical-align:3px"></span> 출고(라인투입)</span>
      <span><span class="dot" style="background:#7f77dd"></span>잔량(우축)</span>
      <span><span style="display:inline-block;width:14px;border-top:2px dashed #888780;vertical-align:3px"></span> 목표선</span>
    </div>
    <div style="position:relative;height:300px"><canvas id="fpcbChart" role="img" aria-label="FPCB 일별 공급"></canvas></div>
  </div>
  <div class="foot" id="fpcbFoot"></div>
</div>
</div>

function riskColor(r){if(r>=0.95)return '#e24b4a';if(r>=0.8)return '#ef9f27';if(r>=0.5)return '#d4a017';return '#1d9e75';}
function weekday(mmdd){const[m,d]=mmdd.split('-').map(Number);return['일','월','화','수','목','금','토'][new Date(2026,m-1,d).getDay()];}

function renderAll(){
  const dates=DATA.dates,items=DATA.items;
  document.getElementById('periodlbl').textContent=dates[0]+' ~ '+dates[dates.length-1]+' · 자재 '+items.length+'종(cavity 합산) · 1240N/1240S';
  const ms=document.getElementById('modelSel'),cur=ms.value;
  ms.innerHTML='<option value="">전체 (1240N+1240S)</option>'+[...new Set(items.map(x=>x.m))].sort().map(m=>`<option value="${m}">${m}</option>`).join('');
  ms.value=cur;
  renderKpis();drawModelPie();drawBalance();renderTable();renderFpcb();
}

function renderKpis(){
  const fb=document.getElementById('focusBar');
  if(focusItem){
    const x=focusItem;
    fb.style.display='flex';
    document.getElementById('focusName').textContent=x.n;
    const usedCav=x.children.filter(c=>c.i>0||c.o>0||c.t>0).length;
    document.getElementById('kpis').innerHTML=[
      {v:fmt(x.i),l:'입고',c:''},{v:fmt(x.o),l:'출고',c:''},
      {v:fmt(x.t),l:'현재 재고',c:'ok2'},{v:fmt(x.ng),l:'NG 수량',c:'wrn'},
      {v:Math.round(x.r*100)+'%',l:'소진율 (출고/투입)',c:x.r>=0.9?'dng':''},
      {v:usedCav+' / '+x.children.length,l:'사용 cavity 수',c:''}
    ].map(k=>`<div class="kpi ${k.c}"><div class="v">${k.v}</div><div class="l">${k.l}</div></div>`).join('');
  }else{
    fb.style.display='none';
    const mf=document.getElementById('modelSel').value;
    const items=DATA.items.filter(x=>!mf||x.m===mf);
    const totIn=items.reduce((a,b)=>a+b.i,0),totOut=items.reduce((a,b)=>a+b.o,0);
    const totTon=items.reduce((a,b)=>a+b.t,0),totNg=items.reduce((a,b)=>a+b.ng,0);
    const riskN=items.filter(x=>x.r>=0.9).length,negN=items.filter(x=>x.t<0).length;
    document.getElementById('kpis').innerHTML=[
      {v:fmt(totIn),l:'총 입고',c:''},{v:fmt(totOut),l:'총 출고',c:''},
      {v:fmt(totTon),l:'현재 총재고',c:'ok2'},{v:fmt(totNg),l:'NG 수량',c:'wrn'},
      {v:riskN+'종',l:'위험 자재 (소진율 90%+)',c:'dng'},{v:negN+'종',l:'마이너스 재고',c:negN>0?'dng':''}
    ].map(k=>`<div class="kpi ${k.c}"><div class="v">${k.v}</div><div class="l">${k.l}</div></div>`).join('');
  }
}

function drawBalance(){
  const dates=DATA.dates,mf=document.getElementById('modelSel').value;
  let din,dout;
  if(focusItem){
    document.getElementById('balScopeLbl').textContent=focusItem.n+' 일별';
    din=focusItem.din.slice();dout=focusItem.dout.slice();
  }else{
    const scope=mf?DATA.items.filter(x=>x.m===mf):DATA.items;
    document.getElementById('balScopeLbl').textContent=mf?(mf+' 합계'):'전체 합계';
    din=dates.map((_,k)=>scope.reduce((a,b)=>a+(b.din[k]||0),0));
    dout=dates.map((_,k)=>scope.reduce((a,b)=>a+(b.dout[k]||0),0));
  }
  const labels=dates.map(d=>d+'('+weekday(d)+')');
  if(balChart)balChart.destroy();
  balChart=new Chart(document.getElementById('balChart'),{type:'bar',
    data:{labels,datasets:[{label:'입고',data:din,backgroundColor:'#378add'},{label:'출고',data:dout,backgroundColor:'#e24b4a'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9aa0ac',boxWidth:12}}},
      scales:{x:{ticks:{color:'#6b7280',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#6b7280',callback:v=>v>=1e6?(v/1e6)+'M':v/1e3+'K'},grid:{color:'#2a2f3a'}}}}});
}

const PIE_COLORS=['#7f77dd','#378add','#1d9e75','#ef9f27','#e24b4a','#d4537e','#5dcaa5','#f0997b','#a78bfa','#60a5fa','#34d399','#fbbf24','#f87171','#e879b9','#2dd4bf','#fb923c'];
function drawModelPie(){
  const card=document.getElementById('modelChart').closest('.card').querySelector('h2');
  let labels,vals;
  if(focusItem){
    card.innerHTML='cavity별 재고 비중 <span>'+focusItem.n+'</span>';
    const used=focusItem.children.filter(c=>c.t>0);
    labels=used.map(c=>String(c.cav));vals=used.map(c=>c.t);
    if(!labels.length){labels=['재고 없음'];vals=[1];}
  }else{
    card.innerHTML='모델별 재고 비중 <span>1240N / 1240S</span>';
    const byModel={};DATA.items.forEach(x=>byModel[x.m]=(byModel[x.m]||0)+x.t);
    labels=Object.keys(byModel);vals=Object.values(byModel);
  }
  if(modelChart)modelChart.destroy();
  modelChart=new Chart(document.getElementById('modelChart'),{type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:focusItem?PIE_COLORS:['#1d9e75','#7f77dd','#378add','#ef9f27']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#9aa0ac',boxWidth:12,font:{size:10}}}}}});
}

function renderTable(){
  const mf=document.getElementById('modelSel').value;
  const q=document.getElementById('search').value.toLowerCase();

  const ro=document.getElementById('riskOnly').checked;

  rows.sort((a,b)=>sort==='risk'?b.r-a.r:sort==='ton'?a.t-b.t:sort==='out'?b.o-a.o:a.n.localeCompare(b.n));
  curRows=rows;
  let html='';
  rows.forEach((x,idx)=>{
    const pct=Math.min(100,Math.round(x.r*100));
    const isOpen=openGroup===idx;
    html+=`<div class="row ${selKey===idx&&!window._childSel?'sel':''}" data-i="${idx}">
      <div class="c-tw">${isOpen?'▾':'▸'}</div>
      <div class="c-name"><div class="nm">${x.n}</div><div class="sub2">${x.c} · ${x.v} · ${x.cav}</div></div>
      <div class="c-num">${fmt(x.b)}</div><div class="c-num">${fmt(x.i)}</div>
      <div class="c-num">${fmt(x.o)}</div><div class="c-num ${x.t<0?'neg':''}">${fmt(x.t)}</div>
      <div class="c-bar"><div class="bartrack"><div class="barfill" style="width:${pct}%;background:${riskColor(x.r)}"></div><span class="pct">${pct}%</span></div></div>
    </div>`;
    if(isOpen){
      html+=`<div class="childbox"><div class="childhdr"><div class="cc-cav">Cavity</div><div class="cc-num">기초</div><div class="cc-num">입고</div><div class="cc-num">출고</div><div class="cc-num">잔량</div></div>`;
      x.children.forEach((c,ci)=>{
        html+=`<div class="crow" data-i="${idx}" data-c="${ci}"><div class="cc-cav">${c.cav}</div><div class="cc-num">${fmt(c.b)}</div><div class="cc-num">${fmt(c.i)}</div><div class="cc-num">${fmt(c.o)}</div><div class="cc-num ${c.t<0?'neg':''}">${fmt(c.t)}</div></div>`;
      });
      html+=`</div>`;
    }
  });
  document.getElementById('tbody').innerHTML=html;
  document.getElementById('foot').textContent='표시 중: '+rows.length+'종 (cavity 합산)';
  document.querySelectorAll('#tbody .row').forEach(r=>r.onclick=()=>toggleGroup(+r.dataset.i));
  document.querySelectorAll('#tbody .crow').forEach(r=>r.onclick=e=>{e.stopPropagation();showChildDetail(+r.dataset.i,+r.dataset.c);});
}

function toggleGroup(idx){
  if(openGroup===idx){openGroup=null;focusItem=null;}
  else{openGroup=idx;focusItem=curRows[idx];}
  selKey=idx;window._childSel=false;
  renderKpis();drawModelPie();drawBalance();renderTable();
  if(openGroup===idx)showDetail(idx);
}

function backfillTon(t,din,dout){
  const n=din.length,ton=new Array(n);
  ton[n-1]=t;
  for(let k=n-2;k>=0;k--)ton[k]=ton[k+1]-(din[k+1]-dout[k+1]);
  return ton.map(v=>Math.round(v));
}
function showDetail(idx){
  const x=curRows[idx],dates=DATA.dates;
  const ton=backfillTon(x.t,x.din,x.dout);
  renderDetailChart(x.n+' (전체 '+x.cav+' 합산)',x.c+' · '+x.v+' · 기초 '+fmt(x.b)+' / 입고 '+fmt(x.i)+' / 출고 '+fmt(x.o)+' / NG '+fmt(x.ng)+' / 잔량 '+fmt(x.t),dates,x.din,x.dout,ton);
}
function showChildDetail(idx,ci){
  const x=curRows[idx],c=x.children[ci],dates=DATA.dates;
  window._childSel=true;
  document.querySelectorAll('#tbody .crow').forEach(r=>r.classList.toggle('csel',+r.dataset.i===idx&&+r.dataset.c===ci));
  const ton=backfillTon(c.t,c.din,c.dout);
  renderDetailChart(x.n+' · Cavity '+c.cav,x.c+' · '+x.v+' · 기초 '+fmt(c.b)+' / 입고 '+fmt(c.i)+' / 출고 '+fmt(c.o)+' / NG '+fmt(c.ng)+' / 잔량 '+fmt(c.t),dates,c.din,c.dout,ton);
}

function renderDetailChart(title,subtitle,dates,din,dout,ton){
  document.getElementById('detail').innerHTML=
    `<h2 style="font-size:14px;font-weight:600;margin-bottom:4px">${title}</h2>
     <div style="color:var(--txt2);font-size:12px;margin-bottom:12px">${subtitle}</div>
     <div style="position:relative;height:240px"><canvas id="dchart" role="img" aria-label="일별 입출고 잔량"></canvas></div>
     <div class="legend"><span><span class="dot" style="background:#378add"></span>일별 입고</span><span><span class="dot" style="background:#e24b4a"></span>일별 출고</span><span><span class="dot" style="background:#7f77dd"></span>잔량 추이(누적)</span></div>`;
  if(detailChart)detailChart.destroy();
  detailChart=new Chart(document.getElementById('dchart'),{
    data:{labels:dates,datasets:[
      {type:'bar',label:'입고',data:din,backgroundColor:'#378add',order:2},
      {type:'bar',label:'출고',data:dout,backgroundColor:'#e24b4a',order:2},
      {type:'line',label:'잔량',data:ton,borderColor:'#7f77dd',backgroundColor:'#7f77dd',borderWidth:2,pointRadius:2,tension:0.2,yAxisID:'y1',order:1}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#6b7280',font:{size:10}},grid:{display:false}},
        y:{position:'left',ticks:{color:'#6b7280'},grid:{color:'#2a2f3a'}},y1:{position:'right',ticks:{color:'#7f77dd'},grid:{display:false}}}}});
  document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderFpcb(){
  const dates=DATA.dates;
  const fpcb=DATA.items.find(x=>x.n.replace(/\s/g,'').includes('FPCB')&&x.n.includes('1240S')&&x.din.some(v=>v>0));
  if(!fpcb){document.getElementById('fpcbKpis').innerHTML='';document.getElementById('fpcbFoot').textContent='JYO1240S FPCB(SMT) 데이터를 찾지 못했습니다.';if(fpcbChart)fpcbChart.destroy();return;}
  const din=fpcb.din,dout=fpcb.dout;
  const ton=backfillTon(fpcb.t,din,dout);
  const avg=Math.round(din.reduce((a,b)=>a+b,0)/din.length);
  const hit=din.filter(v=>v>=FPCB_TARGET).length;
  const short=din.reduce((a,b)=>a+Math.max(0,FPCB_TARGET-b),0);
  document.getElementById('fpcbKpis').innerHTML=[
    {v:fmt(FPCB_TARGET),l:'일 목표',c:''},{v:fmt(avg),l:'일 평균 실입고',c:avg>=FPCB_TARGET?'ok2':'wrn'},
    {v:hit+' / '+din.length+'일',l:'목표 달성일',c:'ok2'},{v:fmt(fpcb.t),l:'현재 재고',c:'ok2'}
  ].map(k=>`<div class="kpi ${k.c}"><div class="v">${k.v}</div><div class="l">${k.l}</div></div>`).join('');
  const labels=dates.map(d=>d+'('+weekday(d)+')');
  const tl={id:'tl',afterDraw(c){const{ctx,chartArea:{left,right},scales:{y}}=c;const yp=y.getPixelForValue(FPCB_TARGET);ctx.save();ctx.strokeStyle='#888780';ctx.lineWidth=2;ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();ctx.restore();}};
  if(fpcbChart)fpcbChart.destroy();
  fpcbChart=new Chart(document.getElementById('fpcbChart'),{type:'bar',
    data:{labels,datasets:[
      {label:'실입고(공급)',data:din,backgroundColor:din.map(v=>v>=FPCB_TARGET?'#1d9e75':'#e24b4a'),borderRadius:3,order:3,yAxisID:'y'},
      {label:'출고(라인투입)',data:dout,type:'line',borderColor:'#9aa0ac',backgroundColor:'#9aa0ac',borderWidth:1.5,borderDash:[4,3],pointRadius:2,tension:0.2,order:2,yAxisID:'y'},
      {label:'잔량',data:ton,type:'line',borderColor:'#7f77dd',backgroundColor:'#7f77dd',borderWidth:2,pointRadius:2,tension:0.2,order:1,yAxisID:'y1'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{if(c.dataset.label==='출고(라인투입)')return '출고 '+fmt(c.parsed.y);if(c.dataset.label==='잔량')return '잔량 '+fmt(c.parsed.y);const diff=c.parsed.y-FPCB_TARGET;return '입고 '+fmt(c.parsed.y)+' ('+(diff>=0?'+':'')+fmt(diff)+')';}}}},
      scales:{x:{ticks:{color:'#888780',font:{size:10},autoSkip:false,maxRotation:45},grid:{display:false}},y:{beginAtZero:true,suggestedMax:180000,ticks:{color:'#888780',callback:v=>(v/1000)+'K'},grid:{color:'#2a2f3a'}},y1:{position:'right',beginAtZero:true,ticks:{color:'#7f77dd',callback:v=>(v/1000)+'K'},grid:{display:false}}}},
    plugins:[tl]});
  document.getElementById('fpcbFoot').textContent='공급처 '+fpcb.v;
}

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));

});
['modelSel','sortSel','search','riskOnly'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{openGroup=null;selKey=null;focusItem=null;renderKpis();drawModelPie();drawBalance();renderTable();});
});
document.getElementById('focusClear').addEventListener('click',()=>{
  openGroup=null;selKey=null;focusItem=null;window._childSel=false;
  document.getElementById('detail').innerHTML='<div class="empty">자재 행을 클릭하면 cavity별 내역과 일별 입출고·잔량 추이가 펼쳐집니다.</div>';
  renderKpis();drawModelPie();drawBalance();renderTable();
});

function excelDate(n){if(n==null||n==='')return null;const d=new Date(Math.round((Number(n)-25569)*86400*1000));if(isNaN(d))return null;return String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
function num(v){const n=Number(v);return isNaN(n)?0:n;}
const TARGET_MODELS=['JYO1240N','JYO1240S'];

document.getElementById('fileInput').addEventListener('change',ev=>{
  const file=ev.target.files[0];if(!file){return;}
  const pw=document.getElementById('pwInput').value;
  if(pw!==UPLOAD_PW){
    document.getElementById('uploadStatus').textContent='⚠ 업로드 암호가 틀렸습니다.';
    ev.target.value='';return;
  }
  document.getElementById('uploadStatus').textContent='읽는 중... '+file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const parsed=parseWorkbook(wb);
      parsed.uploadedAt=new Date().toISOString();
      parsed.fileName=file.name;
      document.getElementById('uploadStatus').textContent='Firebase에 저장 중...';
      fbdb.ref(FB_PATH).set(parsed).then(()=>{
        document.getElementById('uploadStatus').textContent='✓ '+file.name+' 업로드 완료 — 모두에게 반영됨';
      }).catch(err=>{
        document.getElementById('uploadStatus').textContent='⚠ 저장 실패: '+err.message;
      });
      ev.target.value='';
    }catch(err){document.getElementById('uploadStatus').textContent='⚠ 읽기 실패: '+err.message;console.error(err);}
  };
  reader.readAsArrayBuffer(file);
});

function parseWorkbook(wb){
  const get=name=>{const sn=wb.SheetNames.find(s=>s===name)||wb.SheetNames.find(s=>s.includes(name));return sn?XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:null}):[];};
  const stockRows=get('STock'),inRows=get('InPut-Detail'),outRows=get('OutPut-Detail');
  function aggDetail(rows){
    const m={};
    for(let r=3;r<rows.length;r++){
      const row=rows[r];if(!row||row[1]==null||row[4]==null)continue;
      const dt=excelDate(row[2]);if(!dt)continue;
      const key=String(row[4])+'|'+(row[6]==null?'NA':String(row[6]))+'|'+((row[7]||'').toString().trim());
      (m[key]=m[key]||{})[dt]=(m[key][dt]||0)+num(row[9]);
    }
    return m;
  }
  const inAgg=aggDetail(inRows),outAgg=aggDetail(outRows);
  const dset=new Set();[inAgg,outAgg].forEach(a=>Object.values(a).forEach(o=>Object.keys(o).forEach(d=>dset.add(d))));
  const dates=[...dset].sort();
  // cavity leaf
  const leaves=[];
  for(let r=3;r<stockRows.length;r++){
    const row=stockRows[r];if(!row||row[0]==null||row[3]==null)continue;
    if(!TARGET_MODELS.includes(row[1]))continue;
    const cav=row[4]==null?'NA':String(row[4]);
    const v=(row[5]||'').toString().trim();
    const k=String(row[2])+'|'+cav+'|'+v;
    const din=dates.map(d=>Math.round((inAgg[k]||{})[d]||0));
    const dout=dates.map(d=>Math.round((outAgg[k]||{})[d]||0));
    leaves.push({m:row[1],c:String(row[2]),cav,n:row[3],v,b:num(row[6]),i:num(row[9]),o:num(row[10]),ng:num(row[16])+num(row[17]),t:num(row[18]),din,dout});
  }
  // group by name
  const groups={};
  leaves.forEach(lf=>{
    const gk=lf.m+'|'+lf.c+'|'+lf.n+'|'+lf.v;
    if(!groups[gk])groups[gk]={m:lf.m,c:lf.c,n:lf.n,v:lf.v,cav:'',b:0,i:0,o:0,ng:0,t:0,din:dates.map(()=>0),dout:dates.map(()=>0),children:[]};
    const g=groups[gk];['b','i','o','ng','t'].forEach(f=>g[f]+=lf[f]);
    for(let j=0;j<dates.length;j++){g.din[j]+=lf.din[j];g.dout[j]+=lf.dout[j];}
    g.children.push({cav:lf.cav,b:lf.b,i:lf.i,o:lf.o,ng:lf.ng,t:lf.t,din:lf.din,dout:lf.dout});
  });
  const items=Object.values(groups).map(g=>{const av=g.b+g.i;g.r=av>0?g.o/av:0;g.cav=g.children.length+'개 cav';g.children.sort((a,b)=>String(a.cav).localeCompare(String(b.cav)));return g;});
  return {dates,items};
}

// 초기 임베드 데이터로 우선 렌더 (Firebase 연결 전/실패 시 폴백)
renderAll();

// Firebase 실시간 구독: 누군가 업로드하면 자동 갱신
document.getElementById('uploadStatus').textContent='데이터 불러오는 중...';
fbdb.ref(FB_PATH).on('value',snap=>{
  const v=snap.val();
  if(v&&v.items&&v.items.length){
    DATA={dates:v.dates,items:v.items};
    openGroup=null;selKey=null;focusItem=null;window._childSel=false;
    document.getElementById('detail').innerHTML='<div class="empty">자재 행을 클릭하면 cavity별 내역과 일별 입출고·잔량 추이가 펼쳐집니다.</div>';
    renderAll();
    const when=v.uploadedAt?new Date(v.uploadedAt):null;
    const wstr=when?(when.getFullYear()+'-'+String(when.getMonth()+1).padStart(2,'0')+'-'+String(when.getDate()).padStart(2,'0')+' '+String(when.getHours()).padStart(2,'0')+':'+String(when.getMinutes()).padStart(2,'0')):'';
    document.getElementById('uploadStatus').textContent='✓ 공유 데이터 ('+(v.fileName||'')+')';
    document.getElementById('syncBadge').textContent=wstr?('마지막 업로드: '+wstr):'';
    document.getElementById('lastUpdate').textContent=wstr?('🕒 마지막 업데이트  '+wstr):'';
  }else{
    document.getElementById('uploadStatus').textContent='아직 업로드된 데이터가 없습니다. (예시 데이터 표시 중)';
    document.getElementById('lastUpdate').textContent='';
  }
},err=>{
  document.getElementById('uploadStatus').textContent='⚠ Firebase 연결 실패 — 예시 데이터 표시 중';
  console.error(err);
});
</script>
